services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # Задание требует персистентное хранение временных рядов координат.
    # Дефолт образа - только RDB-снапшоты (save 3600 1 300 100 60 10000,
    # проверено: redis-cli CONFIG GET save/appendonly на чистом redis:7-alpine),
    # это переживает штатный restart/down, но при аварийном завершении
    # (kill -9, OOM) можно потерять до ~60 секунд записей. Включаем AOF
    # (fsync раз в секунду по умолчанию) в дополнение к RDB - окно потерь
    # сокращается примерно до 1 секунды, а не устраняется полностью.
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      target: prod
    ports:
      - "${APP_PORT}:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
